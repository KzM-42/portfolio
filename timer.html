<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #ffffff;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      background: #16213e;
      border: 0.5px solid #2e2e4a;
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #aaaacc;
      margin-bottom: 2rem;
    }

    .display {
      font-size: 72px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
      color: #ffffff;
    }

    .display.running {
      color: #b4ef11;
    }

    .display.finished {
      color: #ff6666;
    }

    .preset-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .preset-btn {
      background: #0f3460;
      color: #aaaacc;
      border: 0.5px solid #4a4a7a;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    .preset-btn:hover {
      color: #ffffff;
      border-color: #ffffff;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .btn.start {
      background: #b4ef11;
      color: #1a1a2e;
    }

    .btn.stop {
      background: #0f3460;
      color: #ffffff;
    }

    .btn.reset {
      background: #1a1a2e;
      color: #aaaacc;
      border: 0.5px solid #2e2e4a;
    }

    .message {
      margin-top: 1.5rem;
      font-size: 14px;
      color: #ff6666;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>タイマー</h1>
    <div class="display" id="display">05:00</div>

    <div class="preset-row">
      <button class="preset-btn" onclick="setTimer(1)">1分</button>
      <button class="preset-btn" onclick="setTimer(5)">5分</button>
      <button class="preset-btn" onclick="setTimer(10)">10分</button>
      <button class="preset-btn" onclick="setTimer(25)">25分</button>
    </div>

    <div class="btn-row">
      <button class="btn start" onclick="startTimer()">スタート</button>
      <button class="btn stop" onclick="stopTimer()">ストップ</button>
      <button class="btn reset" onclick="resetTimer()">リセット</button>
    </div>

    <p class="message" id="message"></p>
  </div>

  <script>
    let totalSeconds = 5 * 60;
    let remaining = totalSeconds;
    let timer = null;
    let running = false;

    function updateDisplay() {
      const minutes = Math.floor(remaining / 60);
      const seconds = remaining % 60;
      const display = document.querySelector('#display');
      display.textContent =
        String(minutes).padStart(2, '0') + ':' +
        String(seconds).padStart(2, '0');
    }

    function startTimer() {
      if (running || remaining === 0) return;
      running = true;
      document.querySelector('#display').className = 'display running';
      document.querySelector('#message').textContent = '';

      timer = setInterval(function() {
        remaining = remaining - 1;
        updateDisplay();

        if (remaining === 0) {
          clearInterval(timer);
          running = false;
          document.querySelector('#display').className = 'display finished';
          document.querySelector('#message').textContent = '時間です！';
        }
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timer);
      running = false;
      document.querySelector('#display').className = 'display';
    }

    function resetTimer() {
      clearInterval(timer);
      running = false;
      remaining = totalSeconds;
      updateDisplay();
      document.querySelector('#display').className = 'display';
      document.querySelector('#message').textContent = '';
    }

    function setTimer(minutes) {
      clearInterval(timer);
      running = false;
      totalSeconds = minutes * 60;
      remaining = totalSeconds;
      updateDisplay();
      document.querySelector('#display').className = 'display';
      document.querySelector('#message').textContent = '';
    }
  </script>

</body>
</html>
