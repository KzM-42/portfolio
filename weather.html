<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気アプリ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #ffffff;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .app {
      background: #16213e;
      border: 0.5px solid #2e2e4a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #aaaacc;
      margin-bottom: 1.5rem;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .city-select {
      flex: 1;
      background: #0f3460;
      border: 0.5px solid #4a4a7a;
      color: #ffffff;
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }

    .city-select option {
      background: #0f3460;
    }

    .search-btn {
      background: #b4ef11;
      color: #1a1a2e;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .weather-icon {
      font-size: 64px;
      margin-bottom: 1rem;
    }

    .city-name {
      font-size: 14px;
      color: #aaaacc;
      margin-bottom: 4px;
    }

    .temp {
      font-size: 64px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .desc {
      font-size: 14px;
      color: #aaaacc;
      margin-bottom: 2rem;
    }

    .details {
      display: flex;
      justify-content: space-around;
      border-top: 0.5px solid #2e2e4a;
      padding-top: 1.5rem;
    }

    .detail-label {
      font-size: 11px;
      color: #aaaacc;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 16px;
      font-weight: 500;
    }

    .loading {
      color: #aaaacc;
      font-size: 14px;
      padding: 2rem 0;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>天気アプリ</h1>

    <div class="search-row">
      <select class="city-select" id="city-select">
        <option value="40.82,140.74,青森">青森</option>
        <option value="35.68,139.69,東京">東京</option>
        <option value="34.69,135.50,大阪">大阪</option>
        <option value="35.01,135.76,京都">京都</option>
        <option value="33.59,130.42,福岡">福岡</option>
        <option value="43.06,141.35,札幌">札幌</option>
        <option value="38.27,140.87,仙台">仙台</option>
        <option value="26.21,127.68,那覇">那覇</option>
      </select>
      <button class="search-btn" onclick="getWeather()">検索</button>
    </div>

    <p class="loading" id="loading">取得中...</p>
    <div id="weather-content" style="display: none;">
      <div class="weather-icon" id="icon"></div>
      <p class="city-name" id="city-name"></p>
      <p class="temp" id="temp"></p>
      <p class="desc" id="desc"></p>
      <div class="details">
        <div>
          <p class="detail-label">湿度</p>
          <p class="detail-value" id="humidity"></p>
        </div>
        <div>
          <p class="detail-label">風速</p>
          <p class="detail-value" id="wind"></p>
        </div>
        <div>
          <p class="detail-label">体感</p>
          <p class="detail-value" id="feels"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getWeather() {
      const select = document.querySelector('#city-select');
      const parts = select.value.split(',');
      const lat = parts[0];
      const lon = parts[1];
      const cityName = parts[2];

      document.querySelector('#loading').style.display = 'block';
      document.querySelector('#weather-content').style.display = 'none';

      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=Asia%2FTokyo`)
        .then(function(response) {
          return response.json();
        })
        .then(function(data) {
          const current = data.current;

          document.querySelector('#temp').textContent = Math.round(current.temperature_2m) + '°';
          document.querySelector('#humidity').textContent = current.relative_humidity_2m + '%';
          document.querySelector('#wind').textContent = current.wind_speed_10m + 'm/s';
          document.querySelector('#feels').textContent = Math.round(current.apparent_temperature) + '°';
          document.querySelector('#city-name').textContent = cityName;

          const code = current.weather_code;
          let icon = '☀️';
          let desc = '晴れ';

          if (code === 0) { icon = '☀️'; desc = '快晴'; }
          else if (code <= 3) { icon = '⛅'; desc = '曇り'; }
          else if (code <= 49) { icon = '🌫️'; desc = '霧'; }
          else if (code <= 69) { icon = '🌧️'; desc = '雨'; }
          else if (code <= 79) { icon = '❄️'; desc = '雪'; }
          else if (code <= 99) { icon = '⛈️'; desc = '嵐'; }

          document.querySelector('#icon').textContent = icon;
          document.querySelector('#desc').textContent = desc;

          document.querySelector('#loading').style.display = 'none';
          document.querySelector('#weather-content').style.display = 'block';
        });
    }

    getWeather();
  </script>

</body>
</html>
